<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineGold Premiere</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="kinetic-background"></div>

    <section id="loginPage" class="login-container">
        <div class="ticket-stub-top"></div>
        <h2>Premiere Access</h2>
        <div class="subtitle">Admit One</div>
        <div class="input-group">
            <label>Cinematic ID</label>
            <input type="text" id="email" placeholder="charan@gmail.com">
        </div>
        <div class="input-group">
            <label>Passcode</label>
            <input type="password" id="password" placeholder="••••">
        </div>
        <button id="loginBtn">Validate Ticket</button>
        <div class="ticket-stub-bottom"></div>
    </section>

    <section id="theaterPage" class="hidden">
        <header class="theater-header">
            <h1 id="homeLink" style="cursor: pointer;">Cine<span>Gold</span></h1>

            <div class="filter-console">
                <div class="search-wrapper">
                    <input type="text" id="movieSearch" placeholder="Search the archives...">
                </div>

                <div class="filter-controls">
                    <select id="genreFilter">
                        <option value="">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Horror">Horror</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                    </select>

                    <select id="yearFilter">
                        <option value="">All Years</option>
                        <option value="202">2020s</option>
                        <option value="201">2010s</option>
                        <option value="199">1990s</option>
                        <option value="198">1980s</option>
                    </select>

                    <select id="ratingFilter">
                        <option value="0">Min Rating (All)</option>
                        <option value="8">8.0+ High Rated</option>
                        <option value="7">7.0+ Recommended</option>
                        <option value="5">5.0+ Average</option>
                    </select>
                </div>
            </div>
        </header>

        <div id="movieGrid" class="movie-grid"></div>

        <div class="load-more-container">
            <button id="loadMoreBtn" class="hidden">View More Records</button>
        </div>
    </section>


    <div id="movieModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
